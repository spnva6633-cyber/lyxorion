<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYXORION</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:#fff;
  font-family:'Playfair Display', serif;
  overflow:hidden;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  color:#aaa;
  font-size:14px;
  opacity:0;
  animation:fadeIn 2s forwards;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* LOGO */
.logo{
  font-size:48px;
  letter-spacing:8px;
  opacity:0;
  transform:scale(0.8);
  animation:zoomIn 1.5s forwards;
}

/* TAGLINE */
.tagline{
  margin-top:10px;
  color:#aaa;
  letter-spacing:3px;
  opacity:0;
  animation:fadeIn 2s 1s forwards;
}

/* BUTTON */
.btn{
  margin-top:30px;
  padding:12px 30px;
  border:1px solid #fff;
  color:#fff;
  background:transparent;
  opacity:0;
  transform:translateY(20px);
  animation:slideUp 1.5s 1.5s forwards;
}

/* ANIMATIONS */
@keyframes fadeIn{
  to{
    opacity:1;
  }
}

@keyframes zoomIn{
  to{
    opacity:1;
    transform:scale(1);
  }
}

@keyframes slideUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.footer{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  color:#555;
  font-size:12px;
}
</style>

</head>

<body>

<div class="nav">
  <div>LYXORION</div>
  <div>COMING SOON</div>
</div>

<section class="hero">
  <div class="logo">LYXORION</div>
  <div class="tagline">BEYOND LUXURY</div>
  <button class="btn">COMING SOON</button>
</section>

<div class="footer">
  © 2026 LYXORION
</div>

</body>
</html>
