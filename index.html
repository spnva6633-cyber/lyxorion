<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LYXORION</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  color:#fff;
  font-family:'Playfair Display', serif;
  overflow-x:hidden;
}

/* MOUSE LIGHT EFFECT */
.cursor{
  position:fixed;
  width:200px;
  height:200px;
  background:radial-gradient(circle, rgba(255,255,255,0.15), transparent 70%);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:0;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  color:#aaa;
  font-size:14px;
  z-index:2;
  position:relative;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  z-index:2;
}

/* 3D LOGO */
.logo{
  font-size:60px;
  letter-spacing:10px;
  text-shadow:0 0 10px rgba(255,255,255,0.2);
  transition:0.2s;
}

/* TAGLINE */
.tagline{
  margin-top:10px;
  color:#aaa;
  letter-spacing:3px;
}

/* BUTTONS */
.btn-group{
  margin-top:30px;
}

.btn{
  margin:10px;
  padding:12px 30px;
  border:1px solid #fff;
  color:#fff;
  background:transparent;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
}

/* PARALLAX SECTION */
.parallax{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  background:linear-gradient(180deg,#000,#111);
}

/* PRODUCTS */
.products{
  padding:50px 20px;
  text-align:center;
}

.product-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  border:1px solid #333;
  padding:20px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
  border-color:#fff;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:20px;
  color:#555;
}
</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<div class="nav">
  <div>LYXORION</div>
  <div>COMING SOON</div>
</div>

<section class="hero">
  <div class="logo" id="logo">LYXORION</div>
  <div class="tagline">BEYOND LUXURY</div>

  <div class="btn-group">
    <button class="btn">SHOP NOW</button>
    <button class="btn">EXPLORE</button>
  </div>
</section>

<section class="parallax">
  Luxury Fashion Experience
</section>

<section class="products">
  <h2>Featured Collection</h2>

  <div class="product-grid">
    <div class="card">Product 1</div>
    <div class="card">Product 2</div>
    <div class="card">Product 3</div>
  </div>
</section>

<div class="footer">
  © 2026 LYXORION
</div>

<script>

/* MOUSE FOLLOW LIGHT */
document.addEventListener("mousemove", e=>{
  const cursor = document.getElementById("cursor");
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

/* 3D LOGO EFFECT */
document.addEventListener("mousemove", e=>{
  const logo = document.getElementById("logo");
  let x = (window.innerWidth/2 - e.pageX)/25;
  let y = (window.innerHeight/2 - e.pageY)/25;
  logo.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

</script>

</body>
</html>
